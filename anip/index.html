<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Justice Reinvestment in the ACT</title>

  <style>
    :root {
      --text: #111;
      --muted: #666;
      --border: #e5e5e5;
      --hover: #f7f7f7;
      --max-width: 720px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 48px 24px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: #fff;
      line-height: 1.6;
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      font-weight: 600;
    }

    .subtitle {
      margin-bottom: 40px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .section {
      margin-bottom: 40px;
    }

    .section h2 {
      margin-bottom: 16px;
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: background 0.15s ease;
    }

    .link-card:hover {
      background: var(--hover);
    }

    .link-title {
      font-size: 1rem;
    }

    .link-type {
      color: var(--muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    footer {
      margin-top: 60px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      body {
        padding: 32px 16px;
      }

      .link-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }
    }
	
	.hero {
	  margin-bottom: 48px;
	}

	.hero h1 {
	  margin: 0;
	  font-size: 2.4rem;
	  font-weight: 700;
	  line-height: 1.15;
	  letter-spacing: -0.02em;
	}

	.subheading {
	  margin-top: 10px;
	  color: #666;
	  font-size: 1.05rem;
	  line-height: 1.5;
	}
  </style>
</head>

<body>
  <div class="container">

    <header class="hero">
	  <h1>Justice Reinvestment in the ACT</h1>

	  <p class="subheading">
		A preliminary assessment of the RR25by25 plan
	  </p>
	</header>

    <section class="section">
      <h2>Report</h2>

      <div class="links">
        <a class="link-card" href="paper.pdf" target="_blank">
          <span class="link-title">Full Report</span>
          <span class="link-type">PDF</span>
        </a>

        <a class="link-card" href="appendix.pdf" target="_blank">
          <span class="link-title">Bibliography</span>
          <span class="link-type">PDF</span>
        </a>
      </div>
    </section>

    <section class="section">
      <h2>Offending Pipeline Visualisations</h2>

      <div class="links">
        <a class="link-card" href="diagram-1.png" target="_blank">
          <span class="link-title">Methodology Diagram</span>
          <span class="link-type">PNG</span>
        </a>

        <a class="link-card" href="diagram-2.png" target="_blank">
          <span class="link-title">Data Flow Diagram</span>
          <span class="link-type">PNG</span>
        </a>
      </div>
    </section>

    <footer>
      Last updated: May 2026
    </footer>

  </div>
</body>
</html>
